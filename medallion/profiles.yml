# Use: DBT_PROFILES_DIR=<this folder> when profiles.yml is not in ~/.dbt/.
medallion:
  outputs:
    prod:
      type: bigquery
      method: service-account
      keyfile:  /root/.dbt/learngcp-461809-4016cc4313d1.json
      project: learngcp-461809
      dataset: dbt_dio
      threads: 1
      timeout_seconds: 300
      location: US
      priority: interactive

    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', './medallion/gold.duckdb') }}"
      threads: 4
      attach:
        - path: "{{ env_var('DBT_BRONZE_DUCKDB_PATH', './source_data/raw_data.duckdb') }}"
          alias: cctv
          type: duckdb
          read_only: true

  target: dev          
