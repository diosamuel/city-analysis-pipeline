# Use: DBT_PROFILES_DIR=<this folder> when profiles.yml is not in ~/.dbt/.
#
# Local DuckDB (default target): bronze attaches as catalog `cctv` — see README.
# BigQuery (`target: prod`): set DBT_BIGQUERY_* and point DBT_SOURCE_* at your raw/bronze dataset.
medallion:
  outputs:
    prod:
      type: bigquery
      method: service-account
      keyfile: "{{ env_var('DBT_BIGQUERY_KEYFILE') }}"
      project: "{{ env_var('DBT_BIGQUERY_PROJECT') }}"
      dataset: "{{ env_var('DBT_BIGQUERY_DATASET', 'dbt_medallion') }}"
      threads: 4
      timeout_seconds: 300
      location: "{{ env_var('DBT_BIGQUERY_LOCATION', 'US') }}"
      priority: interactive

    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', './medallion/gold.duckdb') }}"
      threads: 4
      attach:
        - path: "{{ env_var('DBT_BRONZE_DUCKDB_PATH', './source_data/raw_data.duckdb') }}"
          alias: cctv
          type: duckdb
          read_only: true

  target: dev
