# Smart City stack: Kestra (orchestration) + Apache Superset (BI)
#
# Docs:
#   Kestra:  https://kestra.io/docs/installation/docker
#   Superset: https://superset.apache.org/admin-docs/installation/docker-compose/
#
# Usage (repo root):
#   docker compose up -d
#
# UI:
#   Kestra   → http://localhost:8080
#   Superset → http://localhost:8088  (admin / admin unless overridden in .env)
#
# Windows: use Docker Desktop (WSL2). Kestra mounts docker.sock for script/Docker tasks.
# Superset DuckDB: mount below exposes ./medallion inside the container.

volumes:
  postgres-kestra-data:
  postgres-superset-data:
  kestra-storage:

services:
  # --- Kestra persistence (from kestra-io/kestra docker-compose) ---
  postgres-kestra:
    image: postgres:18
    volumes:
      - postgres-kestra-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: ${KESTRA_POSTGRES_PASSWORD:-k3str4}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    pull_policy: always
    stop_grace_period: 6m
    user: root
    command: server standalone
    volumes:
      - kestra-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres-kestra:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${KESTRA_POSTGRES_PASSWORD:-k3str4}
        kestra:
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      postgres-kestra:
        condition: service_healthy

  # --- Superset metadata + cache ---
  superset-db:
    image: postgres:16
    volumes:
      - postgres-superset-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${SUPERSET_DATABASE_DB:-superset}
      POSTGRES_USER: ${SUPERSET_DATABASE_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  superset-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    volumes:
      - ./medallion:/warehouse/medallion:ro
      - ./source_data:/warehouse/source_data:ro
      # Service account JSON(s) for BigQuery: place key at ./.gcp/<GCP_SA_FILENAME> (see .env.example)
      - ./.gcp:/etc/gcp:ro
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-please-change-me-in-production}
      DATABASE_HOST: superset-db
      DATABASE_PORT: "5432"
      DATABASE_DB: ${SUPERSET_DATABASE_DB:-superset}
      DATABASE_USER: ${SUPERSET_DATABASE_USER:-superset}
      DATABASE_PASSWORD: ${SUPERSET_DATABASE_PASSWORD:-superset}
      REDIS_HOST: superset-redis
      REDIS_PORT: "6379"
      ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      GOOGLE_APPLICATION_CREDENTIALS: /etc/gcp/${GCP_SA_FILENAME:-bigquery-sa.json}
    ports:
      - "8088:8088"
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
